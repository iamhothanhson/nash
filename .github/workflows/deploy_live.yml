name: Live Deployment

on:
  push:
    tags:
      - 'v*'   # only tags like v1.0.0

jobs:

  #Deploy to PROD only when tagging
  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to PROD VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/ai-trading-bot
            git fetch --tags origin
            git checkout -f tags/${{ github.ref_name }}
            git clean -fd
            .venv/bin/pip install -r requirements.txt
            sudo systemctl restart bot-prod.service
