[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts = -q
filterwarnings =
    ignore:websockets\.WebSocketClientProtocol is deprecated:DeprecationWarning
    ignore:websockets\.legacy is deprecated.*:DeprecationWarning
markers =
    unit: fast pure-logic tests
    integration: module-chain and IO-mocked tests
    regression: end-to-end and KPI guardrail tests
